name: Trusty 1.0 CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  swift:
    name: Swift package
    runs-on: macos-15

    steps:
      - name: Check out Shotnix
        uses: actions/checkout@v6

      - name: Run Swift tests
        run: swift test

      - name: Build release binary
        run: swift build -c release
